services:
  - type: web
    name: optimfg-backend
    runtime: python
    rootDir: optimfg-backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./optimfg.db
      - key: EMISSION_FACTOR
        value: "0.7"